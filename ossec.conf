<!--
  Wazuh Manager Configuration — SOC Attack Detection Lab
  Tuned for SSH brute-force and port scan detection
-->
<ossec_config>

  <!-- ── Global settings ──────────────────────────────────────────────── -->
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>yes</logall>
    <logall_json>yes</logall_json>
    <email_notification>no</email_notification>
    <smtp_server>localhost</smtp_server>
    <email_from>wazuh@soc-lab.local</email_from>
    <email_to>soc@soc-lab.local</email_to>
    <update_check>no</update_check>
  </global>

  <!-- ── Analysis engine ──────────────────────────────────────────────── -->
  <alerts>
    <log_alert_level>3</log_alert_level>
    <email_alert_level>12</email_alert_level>
  </alerts>

  <!-- ── Remote agent listener ────────────────────────────────────────── -->
  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
    <queue_size>131072</queue_size>
  </remote>

  <!-- ── Syslog listener (for Suricata) ───────────────────────────────── -->
  <remote>
    <connection>syslog</connection>
    <port>514</port>
    <protocol>udp</protocol>
    <allowed-ips>172.20.0.0/24</allowed-ips>
  </remote>

  <!-- ── Ruleset ───────────────────────────────────────────────────────── -->
  <ruleset>
    <decoder_dir>ruleset/decoders</decoder_dir>
    <rule_dir>ruleset/rules</rule_dir>
    <rule_exclude>0215-policy_rules.xml</rule_exclude>
    <list>etc/lists/audit-keys</list>
    <list>etc/lists/amazon/aws-eventnames</list>
    <list>etc/lists/security-eventchannel</list>
  </ruleset>

  <!-- ── Local rules (custom detections) ─────────────────────────────── -->
  <rules>
    <include>local_rules.xml</include>
  </rules>

  <!-- ── Auth.log monitoring ──────────────────────────────────────────── -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <!-- ── Syslog monitoring ─────────────────────────────────────────────── -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <!-- ── Suricata EVE JSON monitoring ─────────────────────────────────── -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/suricata/eve.json</location>
    <label key="@source">suricata</label>
  </localfile>

  <!-- ── Active response: auto-block brute-force IPs ──────────────────── -->
  <active-response>
    <command>firewall-drop</command>
    <location>local</location>
    <rules_id>5712</rules_id>   <!-- SSH brute force rule -->
    <timeout>600</timeout>       <!-- Block for 10 minutes -->
  </active-response>

  <!-- ── Vulnerability detection ──────────────────────────────────────── -->
  <vulnerability-detector>
    <enabled>no</enabled>
    <interval>5m</interval>
    <min_full_scan_interval>6h</min_full_scan_interval>
    <run_on_start>yes</run_on_start>
  </vulnerability-detector>

  <!-- ── System integrity monitoring ──────────────────────────────────── -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>
    <directories>/etc,/usr/bin,/usr/sbin</directories>
    <directories>/bin,/sbin,/boot</directories>
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <nodiff>/etc/ssl/private.key</nodiff>
  </syscheck>

</ossec_config>
